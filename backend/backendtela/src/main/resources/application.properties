# ==========================================
# 📦 Melhor Envio - Shipping Calculation
# ==========================================
melhorenvio.base-url=${MELHORENVIO_BASE_URL:https://www.melhorenvio.com.br}
melhorenvio.token=${MELHORENVIO_TOKEN:}
melhorenvio.origin-cep=${MELHORENVIO_ORIGIN_CEP:60000-000}
melhorenvio.default-width-cm=${MELHORENVIO_DEFAULT_WIDTH_CM:20}
melhorenvio.default-height-cm=${MELHORENVIO_DEFAULT_HEIGHT_CM:4}
melhorenvio.default-length-cm=${MELHORENVIO_DEFAULT_LENGTH_CM:28}
melhorenvio.default-weight-kg=${MELHORENVIO_DEFAULT_WEIGHT_KG:0.3}

# ==========================================
# 🔐 JWT Authentication
# ==========================================
# IMPORTANTE: Em produção, use uma chave com +32 caracteres aleatórios!
# Gere com: openssl rand -base64 32
# ⚠️  SEM VALOR DEFAULT - EXIGE OVERRIDE EM PRODUÇÃO

auth.jwt.secret=${AUTH_JWT_SECRET:}
auth.jwt.expiration-minutes=${AUTH_JWT_EXPIRATION_MINUTES:1440}
auth.admin-emails=${AUTH_ADMIN_EMAILS:admin@tela.com}

# ==========================================
# 🛠️ Error Handling
# ==========================================
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:never}
server.error.include-binding-errors=${SERVER_ERROR_INCLUDE_BINDING_ERRORS:never}
# Use 'always' apenas em desenvolvimento para debug

# ==========================================
# Profiles
# ==========================================
# Execute com: java -Dspring.profiles.active=prod -jar app.jar
# Ou: export SPRING_PROFILES_ACTIVE=prod

